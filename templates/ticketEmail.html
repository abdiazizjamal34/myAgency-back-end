<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <title>Your Ticket from {{agencyName}}</title>
  <style>
    body { font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif; background-color: #f6f6f6; margin: 0; padding: 0; }
    .container { max-width: 600px; margin: 30px auto; background-color: #ffffff; border-radius: 8px; overflow: hidden; box-shadow: 0 4px 10px rgba(0,0,0,0.05); }
    .header { background-color: {{primaryColor}}; padding: 25px 20px; text-align: center; }
    .header img { max-height: 50px; }
    .header h1 { color: #ffffff; margin: 0; font-size: 24px; font-weight: 500; }
    .content { padding: 30px; color: #333333; line-height: 1.6; font-size: 16px; min-height: 150px; }
    .content p { margin-bottom: 20px; text-align: left; }
    .footer { background-color: #f9f9f9; padding: 20px; text-align: center; color: #888888; font-size: 12px; border-top: 1px solid #eeeeee; }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      {{logoTag}}
      <h1>{{agencyName}}</h1>
    </div>
    <div class="content">
      <p>Hello{{passengerName}},</p>
      {{messageBody}}
    </div>
    <div class="footer">
      <p>&copy; {{year}} {{agencyName}}. All rights reserved.</p>
      <p>{{footerText}}</p>
    </div>
  </div>
</body>
</html>
